<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>공부 타이머 🎵</title>
<style>
:root{--bg:#f9f9f7;--card:#fff;--border:#e5e5e2;--text:#1a1a1a;--sub:#6b6b6b;--mute:#9b9b9b;--accent:#7F77DD;--ok:#27a862;--danger:#e5534b;--tag:#f1f0f0}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#242424;--border:#333;--text:#f0f0f0;--sub:#aaa;--mute:#666;--tag:#2e2e2e}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:1.5rem 1rem 4rem}
.wrap{max-width:480px;margin:0 auto}
.dlabel{font-size:12px;color:var(--mute);text-align:center;margin-bottom:1.5rem}
.mystery{font-size:13px;color:var(--mute);text-align:center;margin-bottom:.5rem}
.sync{font-size:11px;color:var(--mute);text-align:center;margin-bottom:1rem;min-height:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem;min-height:110px;display:flex;flex-direction:column;justify-content:center}
.hidden{display:flex;align-items:center;justify-content:center;gap:10px;min-height:80px}
.hidden span{font-size:14px;color:var(--mute)}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-right:5px;margin-bottom:6px;background:var(--tag);color:var(--sub)}
.mtitle{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.mdesc{font-size:12px;color:var(--sub);margin-bottom:.75rem}
.mlink{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:12px;text-decoration:none}
.timer{font-size:58px;font-weight:600;color:var(--text);text-align:center;margin:.75rem 0 1.25rem;font-variant-numeric:tabular-nums;letter-spacing:-1px;transition:color .3s}
.timer.run{color:var(--ok)}
.brow{display:flex;gap:10px;justify-content:center;margin-bottom:.75rem}
.bs{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;font-weight:600}
.bp{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border-radius:12px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:16px;cursor:pointer;font-weight:600}
.sm{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--mute);font-size:12px;cursor:pointer}
.sm:hover,.bs:hover,.mlink:hover{background:var(--tag)}
.center{text-align:center}
.sec{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.stitle{font-size:12px;color:var(--mute);margin-bottom:.75rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.si{padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;font-size:13px}
.sr{display:flex;justify-content:space-between;align-items:center}
.str{font-size:11px;color:var(--mute);margin-top:2px}
.sm2{font-size:11px;color:var(--mute);margin-top:1px}
.total{display:flex;justify-content:space-between;padding:8px 10px;border-top:1px solid var(--border);margin-top:6px;font-size:13px;font-weight:600}
.ma{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);background:var(--bg);resize:none;height:64px;font-family:inherit;margin-bottom:8px}
.ma:focus{outline:none;border-color:var(--accent)}
.smemo{font-size:13px;color:var(--sub);padding:8px 10px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chart{display:flex;align-items:flex-end;gap:8px;height:100px;margin-top:.5rem}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bl{font-size:11px;color:var(--mute)}
.bv{font-size:10px;color:var(--mute)}
.ir{display:flex;gap:8px;margin-bottom:8px}
.ir input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);background:var(--bg);font-family:inherit}
.ir input:focus{outline:none;border-color:var(--accent)}
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px}
.ct{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd{color:var(--mute);cursor:pointer;background:none;border:none;font-size:16px;padding:0 2px}
.cd:hover{color:var(--danger)}
.eh{font-size:12px;color:var(--mute);padding:4px 0}
.cb{font-size:11px;color:var(--mute);font-weight:normal;margin-left:4px;text-transform:none;letter-spacing:0}
.comment{background:#EEEDFE;border-radius:10px;padding:10px 14px;font-size:13px;color:#3C3489;margin-bottom:.75rem;line-height:1.6}
.wmi{padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px}
.wmd{font-size:11px;color:var(--mute);margin-bottom:3px}
.wmt{font-size:13px;color:var(--text)}
.tabs{display:flex;gap:6px;margin-bottom:1rem}
.tb{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--mute);font-size:13px;cursor:pointer;font-family:inherit}
.tb.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
<p class="dlabel" id="dlabel"></p>
<div class="tabs">
<button class="tb on" onclick="showTab('timer')">⏱ 타이머</button>
<button class="tb" onclick="showTab('weekly')">📅 주간 기록</button>
</div>
<div id="ttimer">
<p class="mystery">🔒 시작할 때마다 새로운 BGM 공개 + 자동 재생</p>
<p class="sync" id="sync"></p>
<div class="card">
<div class="hidden" id="hid"><span style="font-size:22px">🎵</span><span>시작 버튼을 누르면 공개!</span></div>
<div id="rev" style="display:none"><div id="tags"></div><p class="mtitle" id="mtitle"></p><p class="mdesc" id="mdesc"></p><a class="mlink" id="mlink" href="#" target="_blank">▶ 유튜브에서 다시 열기</a></div>
</div>
<div class="timer" id="timer">00:00:00</div>
<div class="brow">
<button class="bs" id="bstart" onclick="start()">▶ 시작</button>
<button class="bp" id="bstop" onclick="stop()" style="display:none">⏸ 정지</button>
</div>
<div class="center" style="margin-bottom:1rem"><button class="sm" onclick="resetDay()">↺ 오늘 초기화</button></div>
<div id="cmt"></div>
<div class="sec" id="sw" style="display:none">
<p class="stitle">오늘 집중 기록</p>
<div id="sl"></div>
<div class="total"><span>총 집중 시간</span><strong id="tt"></strong></div>
</div>
<div class="sec" id="ms" style="display:none">
<p class="stitle">오늘 한줄평</p>
<div id="mv" style="display:none"></div>
<div id="me"><textarea class="ma" id="mi" placeholder="오늘 집중은 어땠나요?"></textarea><button class="sm" onclick="saveMemo()">✓ 저장</button></div>
</div>
<div class="sec"><p class="stitle">이번 주 집중 추이 (분)</p><div class="chart" id="wc"></div></div>
<div class="sec">
<p class="stitle">내 취향 링크 추가 <span class="cb" id="cc"></span></p>
<div class="ir"><input type="text" id="ct" placeholder="이름 (예: 비 오는 카페)"/></div>
<div class="ir"><input type="url" id="cu" placeholder="유튜브 링크 붙여넣기"/><button class="sm" onclick="addC()">+ 추가</button></div>
<div id="cl"></div>
</div>
</div>
<div id="tweekly" style="display:none">
<div class="sec"><p class="stitle">이번 주 한줄평 모아보기</p><div id="wml"></div></div>
<div class="sec"><p class="stitle">이번 주 집중 추이 (분)</p><div class="chart" id="wc2"></div></div>
<div class="sec"><p class="stitle">이번 주 전체 기록</p><div id="wsl"></div></div>
</div>
</div>
<script>
var GAS="https://script.google.com/macros/s/AKfycbzzi9fm3AW8ffFL_6xaQrm5CkRA1Rg5xKQFJNUvl2hqgyB02Gc7TRQOJWplgeBT0jvf/exec";

{title:"Anime OST Study Mix",desc:"애니 OST.",url:"https://www.youtube.com/watch?v=Hm1fKAKkFhM",tags:["애니OST","집중"]},

];
var TC={"주혜픽":{bg:"#EEEDFE",c:"#3C3489"},"lofi":{bg:"#E1F5EE",c:"#085041"},"chill":{bg:"#EEEDFE",c:"#3C3489"},"집중":{bg:"#EAF3DE",c:"#27500A"},"카페":{bg:"#FAEEDA",c:"#633806"},"ambient":{bg:"#F1EFE8",c:"#444441"},"라이브":{bg:"#E6F1FB",c:"#0C447C"},"잔잔함":{bg:"#E1F5EE",c:"#085041"},"새벽":{bg:"#EEEDFE",c:"#3C3489"},"chillhop":{bg:"#EEEDFE",c:"#3C3489"},"재즈":{bg:"#FAEEDA",c:"#633806"},"빗소리":{bg:"#E6F1FB",c:"#0C447C"},"자연음":{bg:"#EAF3DE",c:"#27500A"},"도시":{bg:"#F1EFE8",c:"#444441"},"갈색소음":{bg:"#FAECE7",c:"#712B13"},"ADHD":{bg:"#EEEDFE",c:"#3C3489"},"백색소음":{bg:"#F1EFE8",c:"#444441"},"차단":{bg:"#FAECE7",c:"#712B13"},"핑크노이즈":{bg:"#FBEAF0",c:"#72243E"},"카페소음":{bg:"#FAEEDA",c:"#633806"},"지브리":{bg:"#E6F1FB",c:"#0C447C"},"피아노":{bg:"#E6F1FB",c:"#0C447C"},"binaural":{bg:"#F1EFE8",c:"#444441"},"클래식":{bg:"#E6F1FB",c:"#0C447C"},"게임OST":{bg:"#EAF3DE",c:"#27500A"},"K-POP":{bg:"#FBEAF0",c:"#72243E"},"가사있음":{bg:"#FBEAF0",c:"#72243E"},"애니OST":{bg:"#FBEAF0",c:"#72243E"},"내픽":{bg:"#EEEDFE",c:"#3C3489"},"인디팝":{bg:"#FBEAF0",c:"#72243E"}};
var DAYS=["일","월","화","수","목","금","토"];
var BC=["#9FE1CB","#AFA9EC","#FAC775","#F4C0D1","#B5D4F4","#C0DD97","#F5C4B3"];
var iv=null,st=null,el=0,sess=[],ci=-1,used=[],sst=null;
function tk(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function gS(k,f){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):f;}catch(e){return f;}}
function sS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ss(m){document.getElementById("sync").textContent=m;}
function ft(d){var h=d.getHours(),m=d.getMinutes(),ap=h<12?"오전":"오후";h=h%12||12;return ap+" "+h+":"+pd(m);}
function at(){var c=gS("custom_tracks",[]);return TR.concat(c.map(function(x){return{title:x.title,desc:"내가 추가한 트랙",url:x.url,tags:["내픽"]};}));}
function rnd(){var a=at();if(used.length>=a.length)used=[];var av=[];for(var i=0;i<a.length;i++){if(used.indexOf(i)<0)av.push(i);}var idx=av[Math.floor(Math.random()*av.length)];used.push(idx);return idx;}
function pd(n){return n<10?"0"+n:String(n);}
function fs(s){return pd(Math.floor(s/3600))+":"+pd(Math.floor((s%3600)/60))+":"+pd(s%60);}
function fm(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+"시간 "+m+"분";if(m>0)return m+"분 "+(s%60)+"초";return s+"초";}

function start(){if(iv)return;sst=new Date();st=Date.now();iv=setInterval(upd,1000);document.getElementById("timer").classList.add("run");document.getElementById("bstart").style.display="none";document.getElementById("bstop").style.display="inline-flex";ci=rnd();rev(ci);try{window.open(at()[ci].url,"_blank");}catch(e){}}
function stop(){if(!iv)return;clearInterval(iv);iv=null;var et=new Date(),sec=Math.floor((Date.now()-st)/1000);el+=sec;var a=at();var s={sec:sec,title:a[ci].title,startTime:ft(sst),endTime:ft(et)};sess.push(s);st=null;document.getElementById("timer").classList.remove("run");document.getElementById("timer").textContent=fs(el);document.getElementById("bstop").style.display="none";document.getElementById("bstart").style.display="inline-flex";document.getElementById("bstart").textContent="▶ 다시 시작";document.getElementById("hid").style.display="flex";document.getElementById("rev").style.display="none";saveSheet(s);saveLocal();renderS();renderM();renderW();renderCmt();}
function saveSheet(s){ss("저장 중...");var now=new Date(),ds=now.getFullYear()+"."+(now.getMonth()+1)+"."+now.getDate();fetch(GAS,{method:"POST",body:JSON.stringify({type:"session",date:ds,startTime:s.startTime,endTime:s.endTime,sec:s.sec,title:s.title})}).then(function(r){return r.json();}).then(function(d){ss(d.ok?"✓ 구글 시트에 저장됨":"저장 실패");setTimeout(function(){ss("");},3000);}).catch(function(){ss("오프라인 - 로컬 저장");setTimeout(function(){ss("");},3000);});}
function saveMemoSheet(m){var now=new Date(),ds=now.getFullYear()+"."+(now.getMonth()+1)+"."+now.getDate();fetch(GAS,{method:"POST",body:JSON.stringify({type:"memo",date:ds,memo:m})}).catch(function(){});}
function saveLocal(){var k="day_"+tk();var e=gS(k,{total:0,sessions:[],memo:""});e.total=el;e.sessions=sess;sS(k,e);}
function loadSheet(){ss("📡 데이터 불러오는 중...");fetch(GAS).then(function(r){return r.json();}).then(function(data){if(!data.ok||!data.rows||!data.rows.length){ss("");loadLocal();return;}var now=new Date(),td=now.getFullYear()+"."+(now.getMonth()+1)+"."+now.getDate();var ts=[],tot=0,memo="";for(var i=0;i<data.rows.length;i++){var r=data.rows[i];if(r.date===td){var sec=parseInt(r.sec)||0;ts.push({sec:sec,title:r.title||"",startTime:r.startTime||"",endTime:r.endTime||""});tot+=sec;if(r.memo)memo=r.memo;}}if(ts.length>0){el=tot;sess=ts;document.getElementById("timer").textContent=fs(el);document.getElementById("bstart").textContent="▶ 다시 시작";var k="day_"+tk();var lc=gS(k,{total:0,sessions:[],memo:""});lc.total=tot;lc.sessions=ts;if(memo)lc.memo=memo;sS(k,lc);renderS();renderM();renderCmt();ss("✓ 불러오기 완료");}else{ss("");loadLocal();}setTimeout(function(){ss("");},3000);renderWS(data.rows);}).catch(function(){ss("");loadLocal();});}
function loadLocal(){var saved=gS("day_"+tk(),null);if(saved&&saved.total>0){el=saved.total;sess=saved.sessions||[];document.getElementById("timer").textContent=fs(el);document.getElementById("bstart").textContent="▶ 다시 시작";renderS();renderM();renderCmt();}}
function renderWS(rows){var now=new Date(),wd={};for(var i=6;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);wd[d.getFullYear()+"."+(d.getMonth()+1)+"."+d.getDate()]={total:0,memo:""};}for(var i=0;i<rows.length;i++){var r=rows[i];if(wd[r.date]!==undefined){wd[r.date].total+=parseInt(r.sec)||0;if(r.memo)wd[r.date].memo=r.memo;}}for(var i=6;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);var sk=d.getFullYear()+"."+(d.getMonth()+1)+"."+d.getDate();var lk="day_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();var lc=gS(lk,{total:0,sessions:[],memo:""});if(wd[sk].total>0)lc.total=wd[sk].total;if(wd[sk].memo)lc.memo=wd[sk].memo;sS(lk,lc);}renderW();}
function renderS(){var w=document.getElementById("sw");w.style.display=sess.length?"block":"none";var h="";for(var i=0;i<sess.length;i++){var s=sess[i];h+='<div class="si"><div class="sr"><span style="color:var(--sub)">'+(i+1)+'번째 집중</span><strong>'+fm(s.sec)+'</strong></div>';if(s.startTime)h+='<div class="str">'+s.startTime+' → '+s.endTime+'</div>';h+='<div class="sm2">🎵 '+s.title+'</div></div>';}document.getElementById("sl").innerHTML=h;document.getElementById("tt").textContent=fm(el);}
function renderCmt(){var a=document.getElementById("cmt");if(!sess.length){a.innerHTML="";return;}var tm=Math.round(el/60),yd=new Date();yd.setDate(yd.getDate()-1);var ym=Math.round(gS("day_"+yd.getFullYear()+"-"+(yd.getMonth()+1)+"-"+yd.getDate(),{total:0}).total/60);var c=[];if(tm>=120)c.push("오늘 "+tm+"분이나 집중했어요! 정말 대단해요 🔥");else if(tm>=60)c.push("오늘 "+tm+"분 집중 완료! 꾸준히 쌓이고 있어요 💪");else if(tm>0)c.push("오늘 "+tm+"분 집중했어요. 시작한 것만으로도 충분해요 ✨");if(ym>0&&tm>ym)c.push("어제보다 "+(tm-ym)+"분 더 했어요! 성장하고 있어요 📈");var h=sst?sst.getHours():25;if(h<9)c.push("아침 일찍 시작했네요! 하루를 잘 열었어요 ☀️");else if(h<12)c.push("오전에 시작한 건 정말 잘한 선택이에요 👍");if(sess.length>=3)c.push("오늘 "+sess.length+"번이나 집중 세션을 했어요! 🎯");if(!c.length)return;a.innerHTML='<div class="comment">'+c.join("<br>")+'</div>';}
function renderM(){document.getElementById("ms").style.display="block";var d=gS("day_"+tk(),{memo:""});if(d.memo){document.getElementById("me").style.display="none";document.getElementById("mv").style.display="block";document.getElementById("mv").innerHTML='<div class="smemo"><span>'+d.memo+'</span><button class="sm" onclick="editM()">✏ 수정</button></div>';}else{document.getElementById("me").style.display="block";document.getElementById("mv").style.display="none";}}
function saveMemo(){var v=document.getElementById("mi").value.trim();if(!v)return;var k="day_"+tk(),d=gS(k,{total:0,sessions:[],memo:""});d.memo=v;sS(k,d);saveMemoSheet(v);renderM();}
function editM(){document.getElementById("mi").value=gS("day_"+tk(),{memo:""}).memo;document.getElementById("mv").style.display="none";document.getElementById("me").style.display="block";}
function gwc(){var now=new Date(),cols=[];for(var i=0;i<7;i++){var d=new Date(now);d.setDate(now.getDate()-(6-i));var k="day_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();var data=gS(k,{total:0,memo:""});cols.push({label:DAYS[d.getDay()],val:Math.round(data.total/60),memo:data.memo||"",ds:(d.getMonth()+1)+"월 "+d.getDate()+"일",today:i===6});}return cols;}
function renderW(){var cols=gwc(),mx=1;for(var i=0;i<cols.length;i++){if(cols[i].val>mx)mx=cols[i].val;}var h="";for(var i=0;i<cols.length;i++){var c=cols[i];h+='<div class="bc"><div class="bv">'+(c.val>0?c.val:"")+'</div><div class="bar" style="height:'+(Math.round((c.val/mx)*80)+4)+'px;background:'+(c.today?"#7F77DD":BC[i])+';opacity:'+(c.today?1:0.7)+'"></div><div class="bl" style="font-weight:'+(c.today?700:400)+'">'+c.label+'</div></div>';}document.getElementById("wc").innerHTML=h;}
function renderWT(){var cols=gwc(),mx=1;for(var i=0;i<cols.length;i++){if(cols[i].val>mx)mx=cols[i].val;}var h="";for(var i=0;i<cols.length;i++){var c=cols[i];h+='<div class="bc"><div class="bv">'+(c.val>0?c.val:"")+'</div><div class="bar" style="height:'+(Math.round((c.val/mx)*80)+4)+'px;background:'+(c.today?"#7F77DD":BC[i])+';opacity:'+(c.today?1:0.7)+'"></div><div class="bl" style="font-weight:'+(c.today?700:400)+'">'+c.label+'</div></div>';}document.getElementById("wc2").innerHTML=h;var mh="",hm=false;for(var i=0;i<cols.length;i++){if(cols[i].memo){hm=true;mh+='<div class="wmi"><div class="wmd">'+cols[i].ds+" ("+cols[i].label+")"+'</div><div class="wmt">'+cols[i].memo+'</div></div>';}}document.getElementById("wml").innerHTML=hm?mh:'<p class="eh">아직 한줄평이 없어요!</p>';var sh="";for(var i=6;i>=0;i--){var c=cols[6-i];var d=new Date();d.setDate(d.getDate()-i);var k="day_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();var data=gS(k,{sessions:[]});if(data.sessions&&data.sessions.length){sh+='<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--mute);margin-bottom:4px">'+c.ds+" ("+c.label+")"+(c.today?" · 오늘":"")+'</div>';for(var j=0;j<data.sessions.length;j++){var s=data.sessions[j];sh+='<div class="si"><div class="sr"><span style="color:var(--sub)">'+(j+1)+'번째</span><strong>'+fm(s.sec)+'</strong></div>';if(s.startTime)sh+='<div class="str">'+s.startTime+' → '+s.endTime+'</div>';sh+='<div class="sm2">🎵 '+s.title+'</div></div>';}sh+='</div>';}}document.getElementById("wsl").innerHTML=sh||'<p class="eh">이번 주 기록이 없어요.</p>';}
function showTab(t){document.getElementById("ttimer").style.display=t==="timer"?"block":"none";document.getElementById("tweekly").style.display=t==="weekly"?"block":"none";var bs=document.querySelectorAll(".tb");bs[0].className="tb"+(t==="timer"?" on":"");bs[1].className="tb"+(t==="weekly"?" on":"");if(t==="weekly")renderWT();}
function addC(){var t=document.getElementById("ct").value.trim(),u=document.getElementById("cu").value.trim();if(!u)return;var c=gS("custom_tracks",[]);c.push({title:t||"내가 추가한 트랙",url:u});sS("custom_tracks",c);document.getElementById("ct").value="";document.getElementById("cu").value="";renderC();}
function delC(i){var c=gS("custom_tracks",[]);c.splice(i,1);sS("custom_tracks",c);renderC();}
function renderC(){var c=gS("custom_tracks",[]);document.getElementById("cc").textContent=c.length>0?c.length+"개 추가됨":"";var l=document.getElementById("cl"),h="";if(!c.length){l.innerHTML='<p class="eh">아직 추가한 링크가 없어요!</p>';return;}for(var i=0;i<c.length;i++){h+='<div class="ci"><span>🎵</span><span class="ct">'+c[i].title+'</span><button class="cd" onclick="delC('+i+')">✕</button></div>';}l.innerHTML=h;}
function resetDay(){if(iv){clearInterval(iv);iv=null;}el=0;sess=[];st=null;used=[];sst=null;document.getElementById("timer").textContent="00:00:00";document.getElementById("timer").classList.remove("run");document.getElementById("bstart").style.display="inline-flex";document.getElementById("bstart").textContent="▶ 시작";document.getElementById("bstop").style.display="none";document.getElementById("sw").style.display="none";document.getElementById("ms").style.display="none";document.getElementById("hid").style.display="flex";document.getElementById("rev").style.display="none";document.getElementById("cmt").innerHTML="";sS("day_"+tk(),{total:0,sessions:[],memo:""});renderW();}
function init(){var now=new Date();document.getElementById("dlabel").textContent=now.getFullYear()+"년 "+(now.getMonth()+1)+"월 "+now.getDate()+"일 ("+DAYS[now.getDay()]+")";renderW();renderC();loadSheet();}
init();
